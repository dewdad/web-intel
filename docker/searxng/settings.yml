use_default_settings: true

general:
  instance_name: "web-intel"
  debug: false

search:
  safe_search: 0
  default_lang: "en"
  formats:
    - html
    - json

server:
  secret_key: "change-me-in-production"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: true

ui:
  static_use_hash: true

enabled_plugins:
  - 'Hash plugin'
  - 'Tracker URL remover'

engines:
  - name: google
    engine: google
    shortcut: g

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: brave
    engine: brave
    shortcut: br

  - name: bing
    engine: bing
    shortcut: bi

  - name: wikipedia
    engine: wikipedia
    shortcut: wp

  - name: github
    engine: github
    shortcut: gh
